<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLD CUP ELITE 2025</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
--gold:#FFD700;--gold2:#c9960a;--green:#00d46a;--red:#ff3b5c;
--blue:#1a8cff;--orange:#ff9500;--purple:#9b59ff;
--dark:#07090f;--dark2:#0c1018;--dark3:#111724;
--border:rgba(255,255,255,0.07);--text:rgba(255,255,255,0.88);--muted:rgba(255,255,255,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:20px 14px 80px;}
.site-header{text-align:center;padding:32px 0 22px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.site-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,7vw,64px);letter-spacing:0.08em;background:linear-gradient(135deg,#fff 0%,var(--gold) 50%,#fff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 40px rgba(255,215,0,0.3));line-height:1;margin-bottom:4px;}
.site-sub{font-size:11px;letter-spacing:0.45em;color:var(--muted);text-transform:uppercase;}
.sound-toggle{position:fixed;top:14px;right:14px;z-index:999;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:all 0.2s;}
.sound-toggle:hover{background:rgba(255,255,255,0.12);}
.manager-badge{position:fixed;top:14px;left:14px;z-index:999;background:linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,149,0,0.1));border:1px solid rgba(255,215,0,0.3);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--gold);display:none;letter-spacing:0.1em;}
.manager-badge.show{display:block;}

/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:20px;background:rgba(255,255,255,0.03);border-radius:8px;padding:4px;}
.tab{flex:1;padding:9px 4px;text-align:center;border:none;background:transparent;color:var(–muted);cursor:pointer;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:0.03em;transition:all 0.2s;font-family:‘DM Sans’,sans-serif;}
.tab.active{background:rgba(255,255,255,0.08);color:#fff;}
.tab-panel{display:none;}.tab-panel.active{display:block;}

/* BTNS */
.btn{font-family:‘Bebas Neue’,sans-serif;letter-spacing:0.15em;font-size:16px;padding:12px 28px;border:none;border-radius:6px;cursor:pointer;transition:all 0.25s;display:inline-flex;align-items:center;gap:8px;}
.btn-gold{background:linear-gradient(135deg,var(–gold),#e6a800);color:#000;box-shadow:0 4px 20px rgba(255,215,0,0.25);}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,215,0,0.4);}
.btn-ghost{background:rgba(255,255,255,0.04);color:var(–text);border:1px solid var(–border);}
.btn-ghost:hover{background:rgba(255,255,255,0.08);}
.btn-manager{background:linear-gradient(135deg,rgba(255,149,0,0.2),rgba(255,215,0,0.1));color:var(–orange);border:1px solid rgba(255,149,0,0.3);}
.btn-manager:hover{background:rgba(255,149,0,0.3);}
.btn-red{background:rgba(255,59,92,0.15);color:var(–red);border:1px solid rgba(255,59,92,0.3);}
.btn-red:hover{background:rgba(255,59,92,0.25);}
.btn-sm{font-size:12px;padding:8px 16px;}
.btn-xs{font-size:11px;padding:6px 12px;}

/* PHASE BANNER */
.phase-banner{background:linear-gradient(135deg,rgba(26,140,255,0.1),rgba(155,89,255,0.06));border:1px solid rgba(26,140,255,0.18);border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.phase-name{font-family:‘Bebas Neue’,sans-serif;font-size:22px;letter-spacing:0.1em;}
.phase-info{font-size:12px;color:var(–muted);}
.phase-badge{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.22);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;color:var(–gold);letter-spacing:0.1em;}

.section-title{font-family:‘Bebas Neue’,sans-serif;font-size:clamp(18px,3.5vw,24px);letter-spacing:0.12em;color:var(–gold);display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.section-title::after{content:’’;flex:1;height:1px;background:linear-gradient(90deg,rgba(255,215,0,0.3),transparent);}

.status-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.status-item{background:rgba(255,255,255,0.03);border:1px solid var(–border);border-radius:8px;padding:8px 12px;flex:1;min-width:70px;text-align:center;}
.status-val{font-family:‘Bebas Neue’,sans-serif;font-size:20px;color:var(–gold);display:block;}
.status-lbl{font-size:10px;color:var(–muted);letter-spacing:0.1em;}

/* ══ MANAGER PICK ══ */
.manager-pick{background:linear-gradient(135deg,rgba(255,149,0,0.08),rgba(255,215,0,0.04));border:1px solid rgba(255,149,0,0.2);border-radius:12px;padding:24px 18px;text-align:center;margin-bottom:20px;}
.manager-pick-title{font-family:‘Bebas Neue’,sans-serif;font-size:28px;letter-spacing:0.1em;color:var(–orange);margin-bottom:6px;}
.manager-pick-sub{font-size:13px;color:var(–muted);margin-bottom:20px;}
.team-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.team-select-card{background:rgba(255,255,255,0.03);border:1px solid var(–border);border-radius:8px;padding:12px 8px;cursor:pointer;transition:all 0.2s;text-align:center;}
.team-select-card:hover{border-color:rgba(255,149,0,0.4);background:rgba(255,149,0,0.06);transform:translateY(-2px);}
.team-select-card.selected{border-color:var(–orange);background:rgba(255,149,0,0.12);box-shadow:0 0 20px rgba(255,149,0,0.2);}
.tsc-flag{font-size:28px;display:block;margin-bottom:5px;}
.tsc-name{font-size:12px;font-weight:700;}
.tsc-str{font-size:10px;color:var(–muted);margin-top:2px;}

/* ══ DRAW ══ */
.draw-stage{display:flex;flex-direction:column;align-items:center;padding:32px 14px;gap:18px;}
.draw-ball{width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.2),rgba(255,255,255,0.03));border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 0 60px rgba(26,140,255,0.15);transition:all 0.4s;}
.draw-ball.spinning{animation:ballSpin 0.35s linear infinite;border-color:var(–gold);box-shadow:0 0 60px rgba(255,215,0,0.4);}
@keyframes ballSpin{0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(1.08);}100%{transform:rotate(360deg) scale(1);}}
.draw-pairs{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;width:100%;}
.draw-pair{background:rgba(255,255,255,0.04);border:1px solid var(–border);border-radius:8px;padding:10px 12px;animation:pairIn 0.4s ease-out;}
@keyframes pairIn{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
.pair-num{font-size:10px;letter-spacing:0.3em;color:var(–muted);margin-bottom:4px;}
.pair-a{color:var(–gold);font-size:13px;font-weight:700;}
.pair-b{color:var(–blue);font-size:13px;font-weight:700;}
.pair-a.manager-team{color:var(–orange)!important;}
.pair-b.manager-team{color:var(–orange)!important;}

/* ══ MATCH CARDS ══ */
.matches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.match-card{background:linear-gradient(135deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));border:1px solid var(–border);border-radius:10px;overflow:hidden;transition:all 0.25s;}
.match-card:not(.played):hover{border-color:rgba(255,215,0,0.3);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,0.4);}
.match-card.manager-match{border-color:rgba(255,149,0,0.3)!important;}
.mc-header{padding:6px 12px;background:rgba(0,0,0,0.25);font-size:10px;letter-spacing:0.3em;color:var(–muted);display:flex;justify-content:space-between;}
.mc-team{display:flex;align-items:center;padding:10px 12px;gap:8px;border-bottom:1px solid rgba(255,255,255,0.04);}
.mc-team:last-of-type{border-bottom:none;}
.mc-flag{font-size:18px;}
.mc-name{flex:1;font-size:13px;font-weight:600;}
.mc-name.my-team{color:var(–orange)!important;font-weight:800;}
.mc-str{font-size:10px;color:var(–muted);}
.mc-score{font-family:‘Bebas Neue’,sans-serif;font-size:21px;min-width:22px;text-align:center;}
.sc-a{color:var(–gold);}
.sc-b{color:var(–blue);}
.mc-team.winner{background:rgba(255,215,0,0.06);}
.mc-team.loser .mc-name{color:var(–muted);}
.mc-footer{display:flex;border-top:1px solid rgba(255,255,255,0.04);}
.mc-btn{flex:1;padding:8px;text-align:center;background:transparent;border:none;font-family:‘Bebas Neue’,sans-serif;font-size:12px;letter-spacing:0.12em;cursor:pointer;transition:all 0.2s;color:var(–gold);}
.mc-btn:hover{background:rgba(255,215,0,0.08);}
.mc-btn+.mc-btn{border-left:1px solid rgba(255,255,255,0.04);color:var(–muted);}
.mc-btn.manager-btn{color:var(–orange)!important;}
.mc-btn.manager-btn:hover{background:rgba(255,149,0,0.1)!important;}

/* ══════════════════════════════
LIVE MATCH
══════════════════════════════ */
.live-overlay{position:fixed;inset:0;background:#000;z-index:800;display:none;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;}
.live-overlay.open{display:flex;}
.live-wrap{width:100%;max-width:740px;padding:14px 12px 40px;}

/* Pitch background during live */
.live-pitch-bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 50% 40%,rgba(0,80,30,0.25) 0%,rgba(0,0,0,0) 70%);}

.live-scoreboard{background:linear-gradient(135deg,rgba(0,20,10,0.9),rgba(0,10,30,0.9));border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px 14px 14px;margin-bottom:12px;position:relative;overflow:hidden;}
.live-scoreboard::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(–gold),transparent);}
.live-round-label{text-align:center;font-size:10px;letter-spacing:0.4em;color:var(–muted);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(–red);animation:liveDot 0.8s ease-in-out infinite alternate;}
@keyframes liveDot{from{opacity:1;}to{opacity:0.2;}}
.live-teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:10px;}
.live-team{text-align:center;}
.live-flag{font-size:36px;display:block;margin-bottom:4px;transition:transform 0.3s;}
.live-tname{font-family:‘Bebas Neue’,sans-serif;font-size:clamp(13px,2.8vw,18px);letter-spacing:0.07em;}
.live-tstr{font-size:10px;color:var(–muted);}
.live-score-box{display:flex;align-items:center;justify-content:center;gap:6px;font-family:‘Bebas Neue’,sans-serif;font-size:clamp(42px,9vw,62px);line-height:1;}
.live-sa{color:var(–gold);text-shadow:0 0 25px rgba(255,215,0,0.4);}
.live-sb{color:var(–blue);text-shadow:0 0 25px rgba(26,140,255,0.4);}
.live-sep{color:rgba(255,255,255,0.2);font-size:28px;}
.score-bump{animation:scoreBump 0.3s ease-out;}
@keyframes scoreBump{0%{transform:scale(1.6);}100%{transform:scale(1);}}

.live-minute-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.live-minute-badge{font-family:‘Bebas Neue’,sans-serif;font-size:17px;background:rgba(0,212,106,0.12);border:1px solid rgba(0,212,106,0.3);border-radius:6px;padding:3px 10px;color:var(–green);min-width:56px;text-align:center;animation:minuteBlink 1.2s ease-in-out infinite;}
.live-minute-badge.et{background:rgba(255,149,0,0.15);border-color:rgba(255,149,0,0.4);color:var(–orange);}
.live-minute-badge.pen{background:rgba(155,89,255,0.15);border-color:rgba(155,89,255,0.4);color:var(–purple);}
@keyframes minuteBlink{0%,100%{opacity:1;}50%{opacity:0.5;}}
.live-progress-bar{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.live-progress-fill{height:100%;background:linear-gradient(90deg,var(–green),var(–gold));border-radius:3px;transition:width 0.8s linear;}
.live-progress-fill.et{background:linear-gradient(90deg,var(–orange),var(–red));}
.live-half-badge{font-size:10px;letter-spacing:0.15em;color:var(–muted);white-space:nowrap;}

.live-poss-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.poss-val{font-size:11px;font-weight:700;min-width:30px;}
.poss-val-a{color:var(–gold);}
.poss-val-b{color:var(–blue);text-align:right;}
.poss-bar{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;display:flex;}
.poss-bar-a{height:100%;background:var(–gold);transition:width 0.8s ease;}
.poss-bar-b{height:100%;background:var(–blue);transition:width 0.8s ease;}

/* Cards strip */
.cards-strip{display:flex;justify-content:space-between;padding:6px 0 0;font-size:12px;}
.cs-side{display:flex;gap:4px;align-items:center;}
.card-icon{width:12px;height:16px;border-radius:2px;display:inline-block;}
.card-yellow{background:var(–gold);}
.card-red{background:var(–red);}

/* LIVE STATS MINI */
.live-stats-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px;}
.lsm{background:rgba(255,255,255,0.03);border:1px solid var(–border);border-radius:8px;padding:8px;text-align:center;}
.lsm-label{font-size:9px;color:var(–muted);margin-bottom:4px;letter-spacing:0.1em;text-transform:uppercase;}
.lsm-vals{display:flex;justify-content:space-between;align-items:center;gap:5px;}
.lsm-a{font-family:‘Bebas Neue’,sans-serif;font-size:18px;color:var(–gold);}
.lsm-b{font-family:‘Bebas Neue’,sans-serif;font-size:18px;color:var(–blue);}
.lsm-bar{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;display:flex;}
.lsm-bar-a{height:100%;background:var(–gold);transition:width 0.8s ease;}
.lsm-bar-b{height:100%;background:var(–blue);transition:width 0.8s ease;}

/* EVENTS LOG */
.events-panel{background:rgba(0,0,0,0.5);border:1px solid var(–border);border-radius:10px;overflow:hidden;margin-bottom:11px;}
.events-header{padding:7px 13px;background:rgba(255,255,255,0.02);font-size:10px;letter-spacing:0.3em;color:var(–muted);display:flex;justify-content:space-between;align-items:center;}
.events-log{height:200px;overflow-y:auto;padding:0 0 4px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent;}
.event-line{display:flex;align-items:flex-start;gap:8px;padding:7px 13px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px;animation:eventIn 0.35s ease-out;}
@keyframes eventIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.event-line.goal{background:rgba(0,212,106,0.07);border-left:3px solid var(–green);}
.event-line.red-card{background:rgba(255,59,92,0.1);border-left:3px solid var(–red);}
.event-line.yellow{background:rgba(255,215,0,0.05);border-left:3px solid var(–gold);}
.event-line.chance{background:rgba(255,149,0,0.05);border-left:3px solid var(–orange);}
.event-line.et-start{background:rgba(255,149,0,0.08);border-left:3px solid var(–orange);}
.event-line.pen-start{background:rgba(155,89,255,0.08);border-left:3px solid var(–purple);}
.ev-min{font-family:‘Bebas Neue’,sans-serif;font-size:15px;color:var(–gold);min-width:34px;flex-shrink:0;}
.ev-text{flex:1;line-height:1.5;}
.ev-text strong{color:#fff;}

/* POPUPS */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:950;display:none;align-items:center;justify-content:center;}
.popup-overlay.show{display:flex;}
.popup-box{background:var(–dark2);border:1px solid var(–border);border-radius:14px;padding:28px 24px;text-align:center;max-width:400px;width:90%;animation:panelIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes panelIn{from{transform:scale(0.85) translateY(30px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}

/* GOAL BANNER */
.goal-banner{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:930;display:none;align-items:center;justify-content:center;flex-direction:column;gap:6px;}
.goal-banner.show{display:flex;}
.goal-banner-text{font-family:‘Bebas Neue’,sans-serif;font-size:clamp(70px,18vw,130px);letter-spacing:0.05em;color:var(–gold);text-shadow:0 0 80px rgba(255,215,0,0.8),0 0 160px rgba(255,215,0,0.4);animation:goalPop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes goalPop{from{transform:scale(0.3) rotate(-8deg);opacity:0;}to{transform:scale(1);opacity:1;}}
.goal-banner-scorer{font-size:19px;letter-spacing:0.2em;color:rgba(255,255,255,0.85);animation:fadeUp 0.4s ease-out 0.25s both;}
.goal-banner-team{font-size:13px;letter-spacing:0.3em;color:var(–muted);animation:fadeUp 0.4s ease-out 0.4s both;}
.goal-banner.my-goal .goal-banner-text{color:var(–orange);text-shadow:0 0 80px rgba(255,149,0,0.8);}
@keyframes fadeUp{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* RED CARD BANNER */
.redcard-banner{position:fixed;inset:0;background:rgba(80,0,0,0.85);z-index:929;display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
.redcard-banner.show{display:flex;}
.rc-card{width:60px;height:80px;background:var(–red);border-radius:6px;box-shadow:0 0 60px rgba(255,59,92,0.9);animation:rcPop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes rcPop{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(5deg);opacity:1;}}
.rc-text{font-family:‘Bebas Neue’,sans-serif;font-size:clamp(32px,7vw,52px);letter-spacing:0.1em;color:var(–red);animation:fadeUp 0.4s ease-out 0.3s both;}
.rc-player{font-size:16px;letter-spacing:0.2em;color:rgba(255,255,255,0.7);animation:fadeUp 0.4s ease-out 0.45s both;}

/* ET BANNER */
.et-banner{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:929;display:none;align-items:center;justify-content:center;flex-direction:column;gap:6px;}
.et-banner.show{display:flex;}
.et-text{font-family:‘Bebas Neue’,sans-serif;font-size:clamp(36px,8vw,64px);letter-spacing:0.12em;color:var(–orange);text-shadow:0 0 40px rgba(255,149,0,0.6);}
.et-sub{font-size:11px;letter-spacing:0.4em;color:var(–muted);}

/* PEN BANNER */
.pen-banner{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:929;display:none;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
.pen-banner.show{display:flex;}
.pen-title{font-family:‘Bebas Neue’,sans-serif;font-size:clamp(36px,8vw,60px);letter-spacing:0.1em;color:var(–purple);text-shadow:0 0 40px rgba(155,89,255,0.6);}
.pen-scores{font-family:‘Bebas Neue’,sans-serif;font-size:clamp(28px,6vw,44px);color:#fff;margin-top:4px;}
.pen-item{font-size:13px;color:var(–muted);letter-spacing:0.15em;}

/* HALFTIME BANNER */
.ht-banner{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:929;display:none;align-items:center;justify-content:center;flex-direction:column;gap:6px;}
.ht-banner.show{display:flex;}
.ht-text{font-family:‘Bebas Neue’,sans-serif;font-size:clamp(36px,8vw,60px);letter-spacing:0.12em;color:var(–blue);text-shadow:0 0 40px rgba(26,140,255,0.6);}

<script>
// ══════════════════════════════════════════
// AUDIO ENGINE
// ══════════════════════════════════════════
let soundEnabled=true,audioCtx=null,crowdNode=null,crowdGain=null;
function getCtx(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function toggleSound(){soundEnabled=!soundEnabled;document.getElementById('sound-toggle').textContent=soundEnabled?'🔊':'🔇';if(!soundEnabled)stopCrowd();}
function tone(freq,type,dur,vol,delay=0,freqEnd=null){
if(!soundEnabled)return;
try{const ctx=getCtx(),now=ctx.currentTime+delay;const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.setValueAtTime(freq,now);if(freqEnd)o.frequency.linearRampToValueAtTime(freqEnd,now+dur);g.gain.setValueAtTime(vol,now);g.gain.exponentialRampToValueAtTime(0.001,now+dur);o.start(now);o.stop(now+dur+0.01);}catch(e){}
}
function playWhistle(t='short'){
if(!soundEnabled)return;
if(t==='short'){tone(2600,'sawtooth',0.18,0.25,0,2900);}
else if(t==='double'){tone(2600,'sawtooth',0.14,0.25,0,2900);tone(2600,'sawtooth',0.14,0.25,0.22,2900);}
else if(t==='triple'){tone(2600,'sawtooth',0.12,0.25,0,2900);tone(2600,'sawtooth',0.12,0.25,0.18,2900);tone(2600,'sawtooth',0.12,0.25,0.36,2900);}
else{tone(2500,'sawtooth',0.11,0.3,0,2800);tone(2500,'sawtooth',0.11,0.3,0.17,2800);tone(2500,'sawtooth',0.32,0.35,0.34,3000);}
}
function startCrowd(intensity=0.15){
if(!soundEnabled)return;
try{stopCrowd();const ctx=getCtx();const bufSize=ctx.sampleRate*3;const buf=ctx.createBuffer(2,bufSize,ctx.sampleRate);for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1);}const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;const filt=ctx.createBiquadFilter();filt.type='bandpass';filt.frequency.value=450;filt.Q.value=0.6;crowdGain=ctx.createGain();crowdGain.gain.setValueAtTime(0,ctx.currentTime);crowdGain.gain.linearRampToValueAtTime(intensity,ctx.currentTime+0.5);src.connect(filt);filt.connect(crowdGain);crowdGain.connect(ctx.destination);src.start();crowdNode=src;}catch(e){}
}
function setCrowd(val){if(!soundEnabled||!crowdGain)return;try{const ctx=getCtx();crowdGain.gain.linearRampToValueAtTime(Math.max(0.001,val),ctx.currentTime+0.4);}catch(e){}}
function stopCrowd(){try{if(crowdNode){crowdNode.stop();crowdNode=null;crowdGain=null;}}catch(e){}}
function playGoalSound(isMyTeam=false){
if(!soundEnabled)return;
setCrowd(0.7);setTimeout(()=>setCrowd(0.5),800);setTimeout(()=>setCrowd(0.3),2000);setTimeout(()=>setCrowd(0.15),3500);
tone(440,'sawtooth',0.08,0.35,0,660);tone(550,'sawtooth',0.08,0.35,0.1,770);tone(660,'triangle',0.28,0.3,0.2);
if(isMyTeam){setTimeout(()=>{tone(523,'triangle',0.4,0.3,0);tone(659,'triangle',0.4,0.3,0.12);tone(784,'triangle',0.4,0.3,0.24);tone(1047,'triangle',0.5,0.3,0.36);},200);}
}
function playRedCard(){if(!soundEnabled)return;tone(150,'sawtooth',0.3,0.4);setCrowd(0.4);setTimeout(()=>setCrowd(0.18),1500);}
function playYellowCard(){if(!soundEnabled)return;tone(800,'sine',0.15,0.2);tone(600,'sine',0.15,0.2,0.18);}
function playDanger(){if(!soundEnabled)return;setCrowd(0.28);setTimeout(()=>setCrowd(0.15),600);tone(330,'triangle',0.2,0.15);}
function playET(){if(!soundEnabled)return;tone(440,'triangle',0.4,0.25,0);tone(550,'triangle',0.4,0.25,0.14);tone(660,'triangle',0.5,0.3,0.28);}
function playPen(){if(!soundEnabled)return;[440,550,660,880].forEach((f,i)=>tone(f,'sine',0.35,0.25,i*0.1));}

const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=ri(0,i);[b[i],b[j]]=[b[j],b[i]];}return b;}
function getAllPlayers(t){const s=t.squad;return[...(s.ATT||[]),...(s.MID||[]),...(s.DEF||[])];}
function getPos(t,name){const s=t.squad;if(s.GK?.includes(name))return'GK';if(s.DEF?.includes(name))return'DEF';if(s.MID?.includes(name))return'MID';return'ATT';}

// ══════════════════════════════════════════
// GENERATE MATCH EVENTS
// ══════════════════════════════════════════
function generateEvents(tA,tB){
const diff=(tA.str-tB.str)/100;
const probA=Math.min(0.76,Math.max(0.24,0.5+diff*1.8));
const totalGoals=ri(1,5);
const events=[];
const minsUsed=new Set();
let redA=0,redB=0;

// Goals
for(let i=0;i<totalGoals;i++){
let min;do{min=ri(3,90);}while(minsUsed.has(min));
minsUsed.add(min);
const side=Math.random()<probA?'a':'b';
const team=side==='a'?tA:tB;
events.push({min,type:'goal',side,player:pick(getAllPlayers(team)),team});
}

// Yellow cards (3-7 per match — more tension)
const yellows=ri(3,7);
for(let i=0;i<yellows;i++){
let min;do{min=ri(8,90);}while(minsUsed.has(min));
minsUsed.add(min);
const side=Math.random()<0.5?'a':'b';
const team=side==='a'?tA:tB;
events.push({min,type:'yellow',side,player:pick(getAllPlayers(team)),team});
}

// Red cards (20% chance)
if(Math.random()<0.20){
let min;do{min=ri(25,88);}while(minsUsed.has(min));
minsUsed.add(min);
const side=Math.random()<(1-probA)*1.4>0.5?'b':'a';
const team=side==='a'?tA:tB;
if(side==='a')redA++;else redB++;
events.push({min,type:'red',side,player:pick(getAllPlayers(team)),team});
}

// Chances (4-8 — more shots on goal)
const chances=ri(4,8);
for(let i=0;i<chances;i++){
let min;do{min=ri(5,89);}while(minsUsed.has(min));
minsUsed.add(min);
events.push({min,type:'chance',side:Math.random()<probA?'a':'b'});
}

// Fouls / tension events (every ~8 min)
const foulMins=[8,16,24,34,44,51,58,66,74,81,87];
foulMins.forEach(m=>{
if(!minsUsed.has(m)&&Math.random()<0.75){
minsUsed.add(m);
events.push({min:m,type:'foul',side:Math.random()<0.5?'a':'b'});
}
});

// Neutral atmosphere (every ~10 min)
[12,22,32,42,53,63,73,83].forEach(m=>{
if(!minsUsed.has(m)){minsUsed.add(m);events.push({min:m,type:'neutral'});}
});

events.sort((a,b)=>a.min-b.min);
return events;
}

function computeScore(events){
let sA=0,sB=0;
events.filter(e=>e.type==='goal').forEach(g=>{if(g.side==='a')sA++;else sB++;});
return{sA,sB};
}

async function runDraw(){
playDraw();
const ball=document.getElementById('draw-ball');
const container=document.getElementById('draw-pairs-container');
ball.classList.add('spinning');
document.querySelector('.draw-stage .btn-gold').disabled=true;
container.innerHTML='';
const shuffled=shuffle(TEAMS);
const pairs=[];
for(let i=0;i<16;i+=2)pairs.push([shuffled[i],shuffled[i+1]]);
for(let i=0;i<8;i++){
await new Promise(r=>setTimeout(r,150));
const p=pairs[i];
const isManagerMatch=state.myTeam&&(p[0].abbr===state.myTeam.abbr||p[1].abbr===state.myTeam.abbr);
const div=document.createElement('div');div.className='draw-pair';
div.innerHTML=`<div class="pair-num">MATCH ${i+1}${isManagerMatch?' 🎽':''}</div>
<div class="pair-a ${p[0].abbr===state.myTeam?.abbr?'manager-team':''}">${p[0].flag} ${p[0].name}</div>
<div style="font-size:10px;color:var(--muted);margin:2px 0">vs</div>
<div class="pair-b ${p[1].abbr===state.myTeam?.abbr?'manager-team':''}">${p[1].flag} ${p[1].name}</div>`;
container.appendChild(div);
}
state.roundMatches=pairs.map(p=>{const m=[...p];m.result=null;return m;});
ball.classList.remove('spinning');
setTimeout(()=>{
playWhistle('short');
state.phase='bracket';
renderBracket();
notify('⚽ Tirage terminé ! Les matchs sont prêts.');
},900);
}

function openSummaryByPair(i){
playClick();
const entry=state.allMatches.slice().reverse().find(e=>e.pairIdx===i&&e.round===state.round);
if(entry)openSummaryData(entry.result,null,true);
}

// ══════════════════════════════════════════
// LIVE MATCH
// ══════════════════════════════════════════
function playMatchLive(pairIdx){
const pair=state.roundMatches[pairIdx];
const tA=pair[0],tB=pair[1];
const isManagerMatch=state.mode==='manager'&&(tA.abbr===state.myTeam?.abbr||tB.abbr===state.myTeam?.abbr);
const events=generateEvents(tA,tB);
const{sA:baseA,sB:baseB}=computeScore(events);

liveData={
pairIdx,tA,tB,events,isManagerMatch,
myTeamSide: tA.abbr===state.myTeam?.abbr?'a':(tB.abbr===state.myTeam?.abbr?'b':null),
sA:0,sB:0,minute:0,evIdx:0,
shotsA:0,shotsB:0,yA:0,yB:0,rcA:0,rcB:0,
posA:50,halfDone:false,etDone:false,
loggedEvents:[],
phase:'normal',
penLog:[],penSA:0,penSB:0,
sentOffA:[],sentOffB:[],
goals:[],
// pitch animation state
ballX:50,ballY:50,ballTargetX:50,ballTargetY:50,
lastAction:'center'
};

buildLiveScreen();
document.getElementById('live-overlay').classList.add('open');
playWhistle('short');
startCrowd(0.15);
runLiveTimer();
}

// DURATIONS: normal=60s, each ET half=17.5s (35s total), penalties async
const PHASE_DURATIONS={normal:120000,et1:35000,et2:35000};

function runLiveTimer(){
let elapsed=0;
const phase=liveData.phase;
const totalMs=PHASE_DURATIONS[phase]||17500;
const intervalMs=300;
clearInterval(liveInterval);

liveInterval=setInterval(()=>{
if(liveData.phase==='penalties')return;
elapsed+=intervalMs;
const prog=Math.min(elapsed/totalMs,1);
const maxMin=phase==='et1'?105:phase==='et2'?120:90;
const baseMin=phase==='et1'?90:phase==='et2'?105:0;
liveData.minute=baseMin+Math.floor(prog*(maxMin-baseMin));

if(phase==='normal'&&!liveData.halfDone&&liveData.minute>=45){
liveData.halfDone=true;
showHTBanner(liveData.sA,liveData.sB,false);
}

processEventsUpTo(liveData.minute);
updatePitchBall();

const rawP=liveData.posA+(Math.random()-0.5)*3;
liveData.posA=Math.round(Math.max(35,Math.min(65,rawP)));
updateLiveHUD();

if(prog>=1){
clearInterval(liveInterval);
handlePhaseEnd();
}
},intervalMs);
}

function handlePhaseEnd(){
if(liveData.phase==='normal'){
if(liveData.sA===liveData.sB){
liveData.phase='et1';
liveData.evIdx=0;
liveData.events=generateETEvents(liveData.tA,liveData.tB);
showETBanner(liveData.sA,liveData.sB);
setTimeout(()=>runLiveTimer(),2800);
} else {
playWhistle('long');finalizeLiveMatch();
}
} else if(liveData.phase==='et1'){
showHTBanner(liveData.sA,liveData.sB,true);
liveData.phase='et2';
liveData.evIdx=0;
liveData.events=generateETEvents(liveData.tA,liveData.tB);
setTimeout(()=>runLiveTimer(),2200);
} else if(liveData.phase==='et2'){
if(liveData.sA===liveData.sB){
liveData.phase='penalties';
playWhistle('triple');
runPenalties();
} else {
playWhistle('long');finalizeLiveMatch();
}
}
}

function generateETEvents(tA,tB){
const events=[];
const diff=(tA.str-tB.str)/100;
const probA=Math.min(0.75,Math.max(0.25,0.5+diff*1.5));
// Higher goal chance in ET (tired players = more spaces)
if(Math.random()<0.5){
const min=ri(91,119);
const side=Math.random()<probA?'a':'b';
const team=side==='a'?tA:tB;
events.push({min,type:'goal',side,player:pick(getAllPlayers(team)),team,isET:true});
}
// Lots of chances in ET
[93,97,101,106,111,116].forEach(m=>{
if(Math.random()<0.6) events.push({min:m,type:'chance',side:Math.random()<probA?'a':'b'});
else events.push({min:m,type:'neutral'});
});
// Possible red in ET
if(Math.random()<0.15){
const min=ri(92,118);
const side=Math.random()<0.5?'a':'b';
const team=side==='a'?tA:tB;
events.push({min,type:'red',side,player:pick(getAllPlayers(team)),team});
}
events.sort((a,b)=>a.min-b.min);
return events;
}

function runPenalties(){
const{tA,tB}=liveData;
const diff=(tA.str-tB.str)/100;
const probA=Math.min(0.72,Math.max(0.28,0.5+diff*1.5));
let pA=0,pB=0,round=0,done=false;
const results=[];

showPenBanner();
playPen();
addLiveEvent(120,'pen-start','🎯 <strong>TIRS AU BUT !</strong> Place aux pénaltys !','');

let delay=1200;
for(let r=0;r<5&&!done;r++){
// Team A shot
const scoreA=Math.random()<(probA+0.05*r);
const pA_player=pick(getAllPlayers(tA));
setTimeout(()=>{
if(scoreA)pA++;
results.push({team:'a',scored:scoreA,player:pA_player});
addLiveEvent(120+r*2,'goal',`${scoreA?'✅':'❌'} ${tA.flag} ${pA_player} — ${scoreA?'GOAL !':'RATÉ'}`,scoreA?'a':'');
if(scoreA){playGoalSound(liveData.myTeamSide==='a');}else{tone(200,'sawtooth',0.3,0.2);}
updatePenScores(pA,pB,results);
},delay);
delay+=1000;

// Team B shot
const scoreB=Math.random()<(1-probA+0.05*r);
const pB_player=pick(getAllPlayers(tB));
setTimeout(()=>{
if(scoreB)pB++;
results.push({team:'b',scored:scoreB,player:pB_player});
addLiveEvent(120+r*2+1,'goal',`${scoreB?'✅':'❌'} ${tB.flag} ${pB_player} — ${scoreB?'GOAL !':'RATÉ'}`,scoreB?'b':'');
if(scoreB)playGoalSound(liveData.myTeamSide==='b');else tone(200,'sawtooth',0.3,0.2);
updatePenScores(pA,pB,results);
},delay);
delay+=1000;
}

setTimeout(()=>{
liveData.penSA=pA;liveData.penSB=pB;
closePenBanner();
playWhistle('long');
finalizeLiveMatch(pA,pB);
},delay+500);
}

function updatePenScores(pA,pB,results){
const el=document.getElementById('pen-scores-live');
const it=document.getElementById('pen-item-live');
if(el)el.textContent=`${pA} — ${pB}`;
if(it)it.textContent=`${liveData.tA.flag} vs ${liveData.tB.flag}`;
}

function processEventsUpTo(min){
while(liveData.evIdx<liveData.events.length&&liveData.events[liveData.evIdx].min<=min){
processLiveEvent(liveData.events[liveData.evIdx]);
liveData.evIdx++;
}
}

function processLiveEvent(ev){
if(ev.type==='goal'){
if(ev.side==='a')liveData.sA++;else liveData.sB++;
liveData.goals.push(ev);
liveData.shotsA+=(ev.side==='a'?1:0);liveData.shotsB+=(ev.side==='b'?1:0);
const isMyGoal=liveData.myTeamSide===ev.side;
addLiveEvent(ev.min,'goal','⚽ BUT'+(ev.isET?' (PROLONG.)':'')+' ! <strong>'+ev.player+'</strong> — '+ev.team.flag+' '+ev.team.name,ev.side);
showGoalBanner(ev.player,ev.team,isMyGoal);
playGoalSound(isMyGoal);
spawnConfetti(35);
// Move ball to net — team A attacks right (high X), team B attacks left (low X)
liveData.ballTargetX=ev.side==='a'?ri(93,99):ri(1,7);
liveData.ballTargetY=ri(40,60);
const label=document.getElementById('pitch-label');
if(label) label.textContent='⚽ BUT ! '+ev.team.flag+' '+ev.team.name;
const key=registerPlayer(ev.player,ev.team,'');
state.players[key].goals++;
if(!state.scorers[key])state.scorers[key]={name:ev.player,team:ev.team.name,flag:ev.team.flag,abbr:ev.team.abbr,goals:0};
state.scorers[key].goals++;
const el=document.getElementById(ev.side==='a'?'live-sa':'live-sb');
if(el){el.classList.remove('score-bump');void el.offsetWidth;el.classList.add('score-bump');}
const flagEl=document.getElementById(ev.side==='a'?'live-flag-a':'live-flag-b');
if(flagEl){flagEl.style.transform='scale(1.5) rotate(-5deg)';setTimeout(()=>flagEl.style.transform='',600);}
}
else if(ev.type==='red'){
if(ev.side==='a')liveData.rcA++;else liveData.rcB++;
if(ev.side==='a')liveData.sentOffA.push(ev.player);else liveData.sentOffB.push(ev.player);
addLiveEvent(ev.min,'red-card','🟥 CARTON ROUGE ! <strong>'+ev.player+'</strong> est expulsé ! '+ev.team.flag,ev.side);
showRCBanner(ev.player);
playRedCard();
const key=registerPlayer(ev.player,ev.team,'');
state.players[key].redCards++;
}
else if(ev.type==='yellow'){
if(ev.side==='a')liveData.yA++;else liveData.yB++;
const team=ev.side==='a'?liveData.tA:liveData.tB;
addLiveEvent(ev.min,'yellow','🟨 Carton jaune — <strong>'+ev.player+'</strong> '+team.flag,ev.side);
playYellowCard();
const key=registerPlayer(ev.player,team,'');
state.players[key].yellowCards++;
}
else if(ev.type==='chance'){
liveData.shotsA+=(ev.side==='a'?1:0);liveData.shotsB+=(ev.side==='b'?1:0);
const c=pick(CHANCE_EV);
const team=ev.side==='a'?liveData.tA:liveData.tB;
addLiveEvent(ev.min,'chance',c.i+' '+c.t+' ('+team.flag+')',ev.side);
playDanger();
// Move ball near goal for chance
liveData.ballTargetX=ev.side==='a'?ri(78,92):ri(8,22);
liveData.ballTargetY=ri(30,70);
const chLabel=document.getElementById('pitch-label');
if(chLabel) chLabel.textContent=c.i+' OCCASION !';
}
else if(ev.type==='foul'){
const team=ev.side==='a'?liveData.tA:liveData.tB;
const f=pick(FOUL_EV);
addLiveEvent(ev.min,'yellow',f.i+' '+f.t+' — '+team.flag,ev.side);
if(Math.random()<0.3) playYellowCard();
else tone(300,'triangle',0.15,0.1);
}
else if(ev.type==='neutral'){
// Mix neutral with occasional tension in last 20 mins
const isTense=liveData.minute>=70&&Math.random()<0.4;
const ev2=isTense?pick(TENSION_EV):pick(NEUTRAL_EV);
addLiveEvent(ev.min,'neutral',ev2.i+' '+ev2.t,'');
}
}

function addLiveEvent(min,type,text,side){
const log=document.getElementById('events-log');
if(!log)return;
const div=document.createElement('div');
div.className=`event-line ${type}`;
div.innerHTML=`<span class="ev-min">${min}'</span><span class="ev-text">${text}</span>`;
log.prepend(div);
liveData.loggedEvents.unshift({min,type,text,side});
while(log.children.length>50)log.removeChild(log.lastChild);
}

function updateLiveHUD(){
const m=liveData.minute;
const minEl=document.getElementById('live-minute');
if(minEl){
minEl.textContent=`${m}'`;
minEl.className='live-minute-badge';
if(liveData.phase==='et1'||liveData.phase==='et2')minEl.classList.add('et');
if(liveData.phase==='penalties')minEl.classList.add('pen');
}
const prog=document.getElementById('live-progress');
if(prog){
const max=liveData.phase==='et2'?120:liveData.phase==='et1'?105:90;
prog.style.width=`${Math.min(m/max*100,100)}%`;
prog.className='live-progress-fill'+(liveData.phase!=='normal'?' et':'');
}
const half=document.getElementById('live-half');
if(half){
if(liveData.phase==='et1')half.textContent='PROLONG. 1';
else if(liveData.phase==='et2')half.textContent='PROLONG. 2';
else if(liveData.phase==='penalties')half.textContent='TIRS AU BUT';
else half.textContent=m<45?'1ère MI-TEMPS':'2ème MI-TEMPS';
}
const elSA=document.getElementById('live-sa'),elSB=document.getElementById('live-sb');
if(elSA)elSA.textContent=liveData.sA;
if(elSB)elSB.textContent=liveData.sB;
const pA=Math.round(liveData.posA),pB=100-pA;
const paEl=document.getElementById('poss-a'),pbEl=document.getElementById('poss-b');
const paBar=document.getElementById('poss-bar-a'),pbBar=document.getElementById('poss-bar-b');
if(paEl)paEl.textContent=pA+'%';if(pbEl)pbEl.textContent=pB+'%';
if(paBar)paBar.style.width=pA+'%';if(pbBar)pbBar.style.width=pB+'%';
const shA=document.getElementById('shots-a'),shB=document.getElementById('shots-b');
const shBarA=document.getElementById('shots-bar-a'),shBarB=document.getElementById('shots-bar-b');
if(shA)shA.textContent=liveData.shotsA;if(shB)shB.textContent=liveData.shotsB;
const totSh=liveData.shotsA+liveData.shotsB||1;
if(shBarA)shBarA.style.width=`${Math.round(liveData.shotsA/totSh*100)}%`;
if(shBarB)shBarB.style.width=`${Math.round(liveData.shotsB/totSh*100)}%`;
const yA=document.getElementById('yellow-a'),yB=document.getElementById('yellow-b');
if(yA)yA.textContent=liveData.yA+(liveData.rcA>0?` 🟥${liveData.rcA}`:'');
if(yB)yB.textContent=liveData.yB+(liveData.rcB>0?` 🟥${liveData.rcB}`:'');
// Cards strip
const csA=document.getElementById('cs-a'),csB=document.getElementById('cs-b');
if(csA)csA.innerHTML=Array(liveData.yA).fill('<span class="card-icon card-yellow"></span>').join('')+Array(liveData.rcA).fill('<span class="card-icon card-red"></span>').join('');
if(csB)csB.innerHTML=Array(liveData.yB).fill('<span class="card-icon card-yellow"></span>').join('')+Array(liveData.rcB).fill('<span class="card-icon card-red"></span>').join('');
}

function finalizeLiveMatch(penA=null,penB=null){
clearInterval(liveInterval);
stopCrowd();
const{tA,tB,sA,sB,goals,loggedEvents,shotsA,shotsB,posA,yA,yB,rcA,rcB,sentOffA,sentOffB,penSA,penSB}=liveData;
const penalties=penA!==null?{winner:penA>penB?'a':'b',scoreA:penA,scoreB:penB}:null;
const winner=(sA>sB||(sA===sB&&penalties?.winner==='a'))?tA:tB;

addLiveEvent(liveData.phase==='normal'?90:120,'goal',`🏁 MATCH TERMINÉ ! ${winner.flag} <strong>${winner.name}</strong> se qualifie !`,'');

// Assign player ratings
const allPlayers=[...getAllPlayers(tA).map(p=>({p,t:tA,side:'a'})),...getAllPlayers(tB).map(p=>({p,t:tB,side:'b'}))];
allPlayers.forEach(({p,t,side})=>{
const key=registerPlayer(p,t,'');
const isWinner=winner===t;
const isScorer=goals.some(g=>g.player===p&&g.side===side);
const isSentOff=(side==='a'?sentOffA:sentOffB).includes(p);
let note=isWinner?ri(62,78):ri(52,68);
if(isScorer)note=Math.min(99,note+ri(12,20));
if(isSentOff)note=Math.max(30,note-ri(15,25));
note=Math.max(40,Math.min(99,note));
const pd=state.players[key];
pd.matches++;
pd.notes.push(note);
pd.avgNote=Math.round(pd.notes.reduce((a,b)=>a+b,0)/pd.notes.length);
pd.matchHistory.push({match:`${tA.abbr} vs ${tB.abbr}`,round:ROUND_NAMES[state.round],note,scored:isScorer});
});

const result={
teamA:tA,teamB:tB,sA,sB,winner,goals,penalties,
sentOffA,sentOffB,
stats:{posA:Math.round(posA),shotsA,shotsB,foulsA:ri(4,15),foulsB:ri(4,15),passA:ri(280,580),passB:ri(280,580),yA,yB,rcA,rcB},
commentary:loggedEvents,
roundName:ROUND_NAMES[state.round],
hasET:liveData.phase!=='normal'||liveData.etDone
};

state.roundMatches[liveData.pairIdx].result=result;
state.allMatches.push({pairIdx:liveData.pairIdx,round:state.round,result});

const skipBtn=document.getElementById('live-skip-btn');
const closeBtn=document.getElementById('live-close-btn');
if(skipBtn)skipBtn.style.display='none';
if(closeBtn){closeBtn.style.display='inline-flex';}

// Manager result
if(liveData.isManagerMatch){
const myWon=winner.abbr===state.myTeam?.abbr;
setTimeout(()=>showManagerResult(myWon,winner,sA,sB,penalties),1200);
}
}

function showManagerResult(won,winner,sA,sB,penalties){
const overlay=document.getElementById('mro-overlay');
const box=overlay.querySelector('.mro-box')||document.createElement('div');
if(!overlay.querySelector('.mro-box'))overlay.appendChild(box);
box.className='mro-box';
box.innerHTML=`
<span class="mro-icon">${won?'🏆':'😢'}</span>
<div class="mro-title" style="color:${won?'var(--gold)':'var(--red)'}">${won?'VICTOIRE !':'ÉLIMINATION'}</div>
<div class="mro-score">${liveData.tA.flag} ${sA} — ${sB} ${liveData.tB.flag}</div>
${penalties?`<div class="pen-tag">🎯 Tirs au but : ${penalties.scoreA} — ${penalties.scoreB}</div>`:''}
<div class="mro-detail">${won?'Vous vous qualifiez pour le prochain tour !':'Votre aventure s\'arrête ici. Bravo !'}</div>
<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
<button class="btn btn-ghost btn-sm" onclick="closeMRO()">📋 Voir le résumé</button>
${won?`<button class="btn btn-gold btn-sm" onclick="closeMRO()">Continuer →</button>`:''}
</div>`;
overlay.classList.add('show');
if(won){spawnConfetti(60);playWin();}
else{tone(200,'sawtooth',0.5,0.3);setCrowd(0.05);setTimeout(stopCrowd,1500);}
}

function closeMRO(){
document.getElementById('mro-overlay').classList.remove('show');
}

function closeLiveMatch(){
clearInterval(liveInterval);stopCrowd();
document.getElementById('live-overlay').classList.remove('open');
if(liveData&&state.roundMatches[liveData.pairIdx].result){
openSummaryData(state.roundMatches[liveData.pairIdx].result,()=>{renderBracket();renderScorers();},false);
} else {renderBracket();renderScorers();}
}

function skipLiveMatch(){
clearInterval(liveInterval);
processEventsUpTo(999);
liveData.minute=90;updateLiveHUD();
setTimeout(()=>handlePhaseEnd(),300);
}

function forceCloseLive(){
clearInterval(liveInterval);stopCrowd();
document.getElementById('live-overlay').classList.remove('open');
renderBracket();
}

function buildLiveScreen(){
const overlay=document.getElementById('live-overlay');
const{tA,tB,isManagerMatch,myTeamSide}=liveData;
// Clear previous content except pitch bg
const pitch=overlay.querySelector('.live-pitch-bg');

// QUICK SIMULATE
// ══════════════════════════════════════════
function simulateQuick(idx){
const pair=state.roundMatches[idx];
const tA=pair[0],tB=pair[1];
const events=generateEvents(tA,tB);
let sA=0,sB=0;
events.forEach(ev=>{
if(ev.type==='goal'){if(ev.side==='a')sA++;else sB++;}
if(ev.type==='yellow'){const key=registerPlayer(ev.player,ev.team,'');state.players[key].yellowCards++;}
if(ev.type==='red'){const key=registerPlayer(ev.player,ev.team,'');state.players[key].redCards++;}
if(ev.type==='goal'){const key=registerPlayer(ev.player,ev.team,'');state.players[key].goals++;if(!state.scorers[key])state.scorers[key]={name:ev.player,team:ev.team.name,flag:ev.team.flag,abbr:ev.team.abbr,goals:0};state.scorers[key].goals++;}
});
const goals=events.filter(e=>e.type==='goal');
let penalties=null;
if(sA===sB){
const diff=(tA.str-tB.str)/100;
const pA=Math.random()<Math.min(0.72,Math.max(0.28,0.5+diff*1.5));
const a=ri(3,5),b=ri(3,5);
penalties={winner:pA?'a':'b',scoreA:pA?Math.max(a,b+1):a,scoreB:pA?b:Math.max(b,a+1)};
}
const winner=(sA>sB||(sA===sB&&penalties?.winner==='a'))?tA:tB;
const sentOffA=events.filter(e=>e.type==='red'&&e.side==='a').map(e=>e.player);
const sentOffB=events.filter(e=>e.type==='red'&&e.side==='b').map(e=>e.player);
// Assign ratings
[...getAllPlayers(tA).map(p=>({p,t:tA,side:'a'})),...getAllPlayers(tB).map(p=>({p,t:tB,side:'b'}))].forEach(({p,t,side})=>{
const key=registerPlayer(p,t,'');
const isWinner=winner===t;
const isScorer=goals.some(g=>g.player===p&&g.side===side);
const isSentOff=(side==='a'?sentOffA:sentOffB).includes(p);
let note=isWinner?ri(62,78):ri(52,68);
if(isScorer)note=Math.min(99,note+ri(12,20));
if(isSentOff)note=Math.max(30,note-ri(15,25));
const pd=state.players[key];
pd.matches++;pd.notes.push(note);
pd.avgNote=Math.round(pd.notes.reduce((a,b)=>a+b,0)/pd.notes.length);
pd.matchHistory.push({match:`${tA.abbr} vs ${tB.abbr}`,round:ROUND_NAMES[state.round],note,scored:isScorer});
});
const result={
teamA:tA,teamB:tB,sA,sB,winner,goals,penalties,sentOffA,sentOffB,
stats:{posA:ri(35,65),shotsA:ri(3,16),shotsB:ri(3,16),foulsA:ri(4,15),foulsB:ri(4,15),passA:ri(280,580),passB:ri(280,580),yA:events.filter(e=>e.type==='yellow'&&e.side==='a').length,yB:events.filter(e=>e.type==='yellow'&&e.side==='b').length,rcA:sentOffA.length,rcB:sentOffB.length},
commentary:[],roundName:ROUND_NAMES[state.round]
};
pair.result=result;
state.allMatches.push({pairIdx:idx,round:state.round,result});
playWhistle('short');
const penStr = penalties ? ' (TAB: '+penalties.scoreA+'-'+penalties.scoreB+')' : '';
notify(winner.flag+' '+winner.name+' s\'impose '+sA+'-'+sB+penStr+'!');
renderBracket();renderScorers();
}

function simulateAll(){
state.roundMatches.forEach((pair,i)=>{if(!pair.result)simulateQuick(i);});
notify('⚡ Tous les matchs simulés !');
}

// RESULTS

function goToResults(){
const winners=state.roundMatches.map(m=>m.result.winner);
if(winners.length===1){showChampion(winners[0]);return;}

// Check if manager is eliminated
if(state.mode==='manager'&&state.myTeam){
const stillIn=winners.some(w=>w.abbr===state.myTeam.abbr);
if(!stillIn&&!state.eliminated){
state.eliminated=true;
notify(`😢 ${state.myTeam.flag} ${state.myTeam.name} est éliminé !`,4000);
}
}

const nextRound=ROUND_NAMES[state.round+1]||'';
document.getElementById('bracket-content').innerHTML=`
<div class="phase-banner">
<div><div class="phase-name">🏅 Qualifiés — ${ROUND_NAMES[state.round]}</div></div>
<div class="phase-badge">${winners.length} ÉQUIPES</div>
</div>
<div class="qualif-grid">
${winners.map((t,i)=>`<div class="qualif-card" style="animation-delay:${i*0.06}s">
<span class="qc-flag">${t.flag}</span>
<div class="qc-name">${t.name}</div>
${t.abbr===state.myTeam?.abbr?`<div class="qc-badge">🎽 VOUS</div>`:''}
</div>`).join('')}
</div>
<div style="text-align:center">
<p style="color:var(--muted);font-size:13px;margin-bottom:12px">→ <strong style="color:var(--gold)">${nextRound}</strong></p>
<button class="btn btn-gold" onclick="advanceRound()">⚽ LANCER LES ${nextRound.toUpperCase()}</button>
</div>`;
playWin();
}

function advanceRound(){
state.round++;
const winners=state.roundMatches.map(m=>m.result.winner);
const shuffled=shuffle(winners);
state.roundMatches=[];
for(let i=0;i<shuffled.length;i+=2){const pair=[shuffled[i],shuffled[i+1]];pair.result=null;state.roundMatches.push(pair);}
playDraw();renderBracket();
}

function openSummaryData(result,onClose=null,readOnly=false){
const{teamA,teamB,sA,sB,winner,goals,penalties,stats,roundName,sentOffA=[],sentOffB=[]}=result;
const overlay=document.getElementById('summary-overlay');

const tl=goals.length===0
?`<p style="color:var(--muted);font-size:13px;padding:5px 0">Aucun but (0-0)</p>`
:goals.map(g=>`<div class="tl-item ${g.side}-side ${g.type==='red'?'red':''}">
<div class="tl-min">${g.min}'</div>
<div style="font-size:14px">${g.isET?'⏱':'⚽'}</div>
<div><div class="tl-scorer">${g.player}</div><div class="tl-team">${g.team.flag} ${g.team.name}${g.isET?' (prolong.)':''}</div></div>
</div>`).join('');

// Red cards in timeline
const rcLines=(result.commentary||[]).filter(e=>e.type==='red-card').map(e=>`
<div class="tl-item red ${e.side}-side">
<div class="tl-min">${e.min}'</div><div>🟥</div>
<div><div class="tl-scorer">${e.text.replace(/<[^>]+>/g,'').replace('🟥 CARTON ROUGE ! ','').replace(' est expulsé !','')}</div></div>
</div>`).join('');

const lineupHTML=(team,side)=>{
const s=team.squad;
const gscorers=goals.filter(g=>g.side===side).map(g=>g.player);
const sentOff=side==='a'?sentOffA:sentOffB;
const mkP=(lbl,pl)=>{
if(!pl||!pl.length)return '';
return `<div class="lineup-pos">${lbl}</div>${pl.map(p=>{
const key=p+'_'+team.abbr;
const pd=state.players[key];
const note=pd?.notes?.length?pd.notes[pd.notes.length-1]:ri(55,75);
const nc=note>=80?'#00d46a':note>=70?'#FFD700':note>=60?'#ff9500':'#ff3b5c';
const isSentOff=sentOff.includes(p);
return `<div class="lineup-player ${gscorers.includes(p)?'scorer':''} ${isSentOff?'sent-off':''}">
<span>${gscorers.includes(p)?'⚽ ':''}${isSentOff?'🟥 ':''}${p}</span>
<span class="player-note" style="background:${nc}22;color:${nc};border:1px solid ${nc}44">${note}</span>
</div>`;
}).join('')}`;
};
return mkP('GK',s.GK)+mkP('DEF',s.DEF)+mkP('MIL',s.MID)+mkP('ATT',s.ATT);
};

const mkBar=(vA,vB,label,unit='')=>{
const tot=vA+vB||1;const pA=Math.round(vA/tot*100);const pB=100-pA;
const dA=unit==='%'?pA:vA,dB=unit==='%'?pB:vB;
return `<div class="stats-row">
<div class="stat-val" style="color:var(--gold)">${dA}${unit}</div>
<div class="stat-bar-wrap" style="transform:scaleX(-1)"><div class="stat-bar-inner" style="width:${pA}%;background:linear-gradient(90deg,var(--gold),#c9960a)"></div></div>
<div class="stat-label">${label}</div>
<div class="stat-bar-wrap"><div class="stat-bar-inner" style="width:${pB}%;background:linear-gradient(90deg,var(--blue),#0a5ac9)"></div></div>
<div class="stat-val" style="color:var(--blue)">${dB}${unit}</div>
</div>`;
};

const penHTML=penalties?`<div class="pen-tag">🎯 Tirs au but : ${teamA.abbr} ${penalties.scoreA} — ${penalties.scoreB} ${teamB.abbr}</div>`:'';
const etHTML=result.hasET?`<div class="et-tag">⏱ Match décidé aux prolongations</div>`:'';

overlay.innerHTML=`
<div class="summary-panel">
<div class="sp-hero">
<div class="sp-round">${roundName.toUpperCase()}</div>
<div class="sp-teams-grid">
<div class="sp-team"><span class="sp-flag">${teamA.flag}</span><div class="sp-name">${teamA.name}</div></div>
<div class="sp-score-box"><div class="sp-sa">${sA}</div><div class="sp-sep">:</div><div class="sp-sb">${sB}</div></div>
<div class="sp-team"><span class="sp-flag">${teamB.flag}</span><div class="sp-name">${teamB.name}</div></div>
</div>
${penHTML}${etHTML}
<div class="sp-winner-tag">🏅 VAINQUEUR : ${winner.flag} ${winner.name}</div>
</div>
<div class="sp-body">
<div class="sp-stitle">👕 Compositions & Notes</div>
<div class="lineup-grid">
<div class="lineup-col"><div class="lineup-header" style="color:var(--gold)">${teamA.flag} ${teamA.name}</div>${lineupHTML(teamA,'a')}</div>
<div class="lineup-col"><div class="lineup-header" style="color:var(--blue)">${teamB.flag} ${teamB.name}</div>${lineupHTML(teamB,'b')}</div>
</div>
<div class="sp-stitle">⚽ Buts & Événements</div>
<div class="timeline">${tl}${rcLines}</div>
<div class="sp-stitle">📊 Statistiques</div>
${mkBar(stats.posA,100-stats.posA,'Possession','%')}
${mkBar(stats.shotsA,stats.shotsB,'Tirs')}
${mkBar(stats.passA,stats.passB,'Passes')}
${mkBar(stats.foulsA,stats.foulsB,'Fautes')}
${mkBar(stats.yA||0,stats.yB||0,'Jaunes')}
</div>
<div class="sp-footer">
<button class="btn btn-ghost btn-sm" onclick="closeSummary()">✕ Fermer</button>
${!readOnly?`<button class="btn btn-gold btn-sm" onclick="closeSummary(true)">Continuer →</button>`:''}
</div>
</div>`;
overlay.classList.add('open');
overlay._onClose=onClose;
}

${p.matchHistory.length?`
<div style="margin-bottom:8px"><div class="sp-stitle">📋 Historique des matchs</div>
<div class="profile-match-history">
${p.matchHistory.map(m=>{
const nc=m.note>=80?'var(--green)':m.note>=70?'var(--gold)':m.note>=60?'var(--orange)':'var(--red)';
return `<div class="pmh-item">
<div><div style="font-weight:700;font-size:13px">${m.match}</div><div class="pmh-match">${m.round}${m.scored?' · ⚽ But':''}</div></div>
<div class="pmh-note" style="color:${nc}">${m.note}</div>
</div>`;
}).join('')}
</div>
</div>`:''}
</div>
<div class="profile-footer">
<button class="btn btn-ghost btn-sm" onclick="closeProfile()">✕ Fermer</button>
</div>
</div>`;
overlay.classList.add('open');
}

function closeProfile(){
document.getElementById('profile-overlay').classList.remove('open');
}

// ══════════════════════════════════════════
// HISTORY
// ══════════════════════════════════════════
function renderHistory(){
const c=document.getElementById('history-content');
if(!state.allMatches.length){c.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)">📋 Aucun match joué</div>`;return;}
const byRound={};
state.allMatches.forEach(e=>{const rn=e.result.roundName;if(!byRound[rn])byRound[rn]=[];byRound[rn].push(e);});
c.innerHTML=Object.entries(byRound).map(([rn,entries])=>`
<div class="section-title" style="margin-bottom:10px">${rn}</div>
${entries.map(e=>{
const{teamA,teamB,sA,sB,winner,penalties}=e.result;
const wA=winner===teamA;
return `<div class="hist-match" onclick="openHistSummary(${state.allMatches.indexOf(e)})">
<div style="flex:1;display:flex;align-items:center;justify-content:space-between;gap:8px">
<span style="font-weight:700;color:${wA?'var(--gold)':'var(--muted)'};">${teamA.flag} ${teamA.name}</span>
<span style="font-family:'Bebas Neue',sans-serif;font-size:20px"><span class="sc-a">${sA}</span> — <span class="sc-b">${sB}</span>${penalties?'<span style="font-size:10px;color:var(--purple)"> TAB</span>':''}</span>
<span style="font-weight:700;color:${!wA?'var(--blue)':'var(--muted)'};">${teamB.flag} ${teamB.name}</span>
</div>
<span style="font-size:11px;color:var(--muted)">📋</span>
</div>`;
}).join('')}
<div style="margin-bottom:16px"></div>`).join('');
}

function openHistSummary(idx){const e=state.allMatches[idx];if(e)openSummaryData(e.result,null,true);}

// ══════════════════════════════════════════
// CHAMPION
// ══════════════════════════════════════════
function showChampion(team){
state.champion=team;
const isMyTeam=state.mode==='manager'&&team.abbr===state.myTeam?.abbr;
playChampion();
for(let i=0;i<8;i++)setTimeout(()=>spawnConfetti(50),i*400);
document.getElementById('bracket-content').innerHTML=`
<div class="champ-screen">
<div class="champ-suptitle">${isMyTeam?'🎉 FÉLICITATIONS MANAGER ! 🎉':'🎉 CHAMPION DU MONDE 2025 🎉'}</div>
<span class="champ-trophy">🏆</span>
<span class="champ-flag">${team.flag}</span>
<div class="champ-name">${team.name}</div>
<div class="champ-tag">${isMyTeam?'VOUS ÊTES CHAMPION DU MONDE !':'EST CHAMPION DU MONDE !'}</div>
<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
<button class="btn btn-gold" onclick="switchTab('scorers')">⚽ Buteurs</button>
<button class="btn btn-ghost" onclick="switchTab('players')">👤 Joueurs</button>
<button class="btn btn-ghost" onclick="switchTab('history')">📋 Matchs</button>
<button class="btn btn-red" onclick="restartGame()">🔄 Nouveau tournoi</button>
</div>
</div>`;
}

// ══════════════════════════════════════════
// RESTART
// ══════════════════════════════════════════
function restartGame(){
state={mode:'normal',myTeam:null,phase:'menu',round:0,roundMatches:[],allMatches:[],scorers:{},players:{},champion:null,eliminated:false};
liveData=null;clearInterval(liveInterval);stopCrowd();
document.getElementById('manager-badge').classList.remove('show');
renderMenu();renderScorers();renderHistory();renderPlayers();
switchTab('bracket');
}

// INIT
renderMenu();
</script>

</body>
</html>
